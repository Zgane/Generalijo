<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generali – Generator maila</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --border: #e2e6ec;
  --red: #c0392b;
  --red-light: #fdf2f1;
  --red-mid: #f5c6c2;
  --text: #1a1f2e;
  --muted: #6b7280;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px 60px;
}

header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeUp 0.5s ease both;
}

.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--red);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
}

h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}

.subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-top: 4px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  box-shadow: var(--shadow);
  max-width: 600px;
  margin: 0 auto 20px;
  animation: fadeUp 0.5s ease both;
}

.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.1s; }

.card-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

/* Upload zone */
.upload-zone {
  border: 2px dashed var(--red-mid);
  border-radius: 12px;
  padding: 36px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--red-light);
  position: relative;
}

.upload-zone:hover, .upload-zone.drag {
  border-color: var(--red);
  background: #fce8e6;
}

.upload-zone input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.upload-icon { font-size: 36px; margin-bottom: 12px; }

.upload-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--red);
  margin-bottom: 4px;
}

.upload-sub {
  font-size: 13px;
  color: var(--muted);
}

.file-selected {
  display: none;
  align-items: center;
  gap: 12px;
  background: var(--green-light);
  border: 1px solid #86efac;
  border-radius: 10px;
  padding: 14px 16px;
  margin-top: 12px;
}

.file-selected.show { display: flex; }

.file-icon {
  font-size: 24px;
  flex-shrink: 0;
}

.file-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--green);
  word-break: break-all;
}

/* Button */
.btn {
  width: 100%;
  padding: 16px;
  background: var(--red);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  margin-top: 16px;
}

.btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
.btn:disabled { opacity: 0.4; cursor: default; }

/* Loading */
.loading {
  display: none;
  text-align: center;
  padding: 24px;
}

.loading.show { display: block; }

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--red-mid);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}

.loading-text {
  font-size: 14px;
  color: var(--muted);
}

/* Result */
.result-card {
  display: none;
  max-width: 600px;
  margin: 0 auto;
  animation: fadeUp 0.4s ease both;
}

.result-card.show { display: block; }

.tip-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--red);
  color: white;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 12px;
}

.zadeva-box {
  background: var(--red-light);
  border: 1px solid var(--red-mid);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 16px;
}

.zadeva-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--red);
  margin-bottom: 4px;
}

.zadeva-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.mail-body {
  background: #f8f9fb;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow-y: auto;
  margin-bottom: 16px;
}

.btn-copy {
  width: 100%;
  padding: 14px;
  background: var(--text);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-bottom: 10px;
}

.btn-copy:hover { opacity: 0.85; }
.btn-copy.copied { background: var(--green); }

.btn-novo {
  width: 100%;
  padding: 13px;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-novo:hover { border-color: var(--red); color: var(--red); }

/* Error */
.error-box {
  display: none;
  background: var(--red-light);
  border: 1px solid var(--red-mid);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 14px;
  color: var(--red);
  margin-top: 12px;
}

.error-box.show { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🦁</div>
    <h1>Generali Generator</h1>
  </div>
  <p class="subtitle">Naloži polico → dobiš mail</p>
</header>

<!-- Upload card -->
<div class="card" id="uploadCard">
  <div class="card-title">Naloži polico</div>

  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".pdf" />
    <div class="upload-icon">📄</div>
    <div class="upload-text">Izberi PDF polico</div>
    <div class="upload-sub">Avto ali Dom · Generali zavarovalnica</div>
  </div>

  <div class="file-selected" id="fileSelected">
    <div class="file-icon">✅</div>
    <div class="file-name" id="fileName"></div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <button class="btn" id="generateBtn" disabled onclick="generiraj()">
    Generiraj mail →
  </button>
</div>

<!-- Loading -->
<div class="card loading" id="loadingCard">
  <div class="spinner"></div>
  <div class="loading-text">Berem polico in sestavljam mail...</div>
</div>

<!-- Result -->
<div class="result-card card" id="resultCard">
  <div class="card-title">Sestavljen mail</div>
  <span class="tip-badge" id="tipBadge"></span>
  <div class="zadeva-box">
    <div class="zadeva-label">Zadeva</div>
    <div class="zadeva-text" id="zadeva"></div>
  </div>
  <div class="mail-body" id="mailBody"></div>
  <button class="btn-copy" id="copyBtn" onclick="kopiraj()">📋 Kopiraj besedilo maila</button>
  <button class="btn-novo" onclick="novaPolica()">← Nova polica</button>
</div>

<script>
let selectedFile = null;
let generatedMail = '';
let generatedZadeva = '';

const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
const fileSelected = document.getElementById('fileSelected');
const fileName = document.getElementById('fileName');
const generateBtn = document.getElementById('generateBtn');
const errorBox = document.getElementById('errorBox');

// Drag & drop
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') izbranaDatoteka(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) izbranaDataoteka(e.target.files[0]);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) izbranaDataoteka(e.target.files[0]);
});

function izbranaDataoteka(file) {
  selectedFile = file;
  fileName.textContent = file.name;
  fileSelected.classList.add('show');
  generateBtn.disabled = false;
  errorBox.classList.remove('show');
}

async function generiraj() {
  if (!selectedFile) return;

  // Pokaži loading
  document.getElementById('uploadCard').style.display = 'none';
  document.getElementById('loadingCard').classList.add('show');
  document.getElementById('resultCard').classList.remove('show');
  errorBox.classList.remove('show');

  try {
    // Preberi PDF kot base64
    const base64 = await beriPdfBase64(selectedFile);

    // Pošlji Claudu
    const prompt = `Si zavarovalni asistent za Generali zavarovalnico. Preberi priloženo PDF polico in sestavi profesionalen mail za stranko.

PRAVILA ZA MAIL:

ZADEVA: "Obnova avtomobilskega zavarovanja – [ZNAMKA MODEL] [REGISTRSKA]" za avto, ali "Zavarovanje nepremičnine – [NASLOV]" za dom.

TELO MAILA - točno ta format, nič drugega:

Za AVTO polico:
Pozdravljeni,

spodaj sem vam pripravil povzetek zavarovanja vašega avtomobila [ZNAMKA MODEL] ([REGISTRSKA]), ki velja od [DATUM_OD] do [DATUM_DO].

OBVEZNA ZAVAROVANJA

- AO – avtomobilska odgovornost
  ↳ stvari do [ZV_STVARI]€ / osebe do [ZV_OSEBE]€ + zelena karta
- AO+ – zavarovanje voznika (če je na polici)
  ↳ telesne poškodbe do [ZV_AO_PLUS]€
- ⚠️ Vključen zamrznjen bonus – prva škoda ne vpliva na vaš premijski razred (SAMO če piše AO-ZAMRZNJEN)
- Nezgoda – nezgodno zavarovanje oseb (če je na polici)
  ↳ smrt [ZV_SMRT]€ / invalidnost [ZV_INV]€ po osebi, vsi potniki
- Pravna zaščita (če je na polici)
  ↳ do [ZV_PZ]€
- Asistenca [VARIANTA] (če je na polici)
  ↳ pomoč na cesti do [KM] km, nadomestno vozilo do 3 dni pri okvari
  POMEMBNO: Asistenca L = 500 km, Asistenca M = 300 km

KASKO ZAVAROVANJE (samo če je na polici)

- ⚠️ Vključen odkup prve škode – prva škoda ne vpliva na vaš premijski razred (samo če piše "odkup prve škode AK")
- Prometna nesreča
  ↳ franšiza [X]% (~[EUR]€) ALI brez franšize
- Požar
  ↳ brez franšize
- Narava (vihar, poplave, potres...)
  ↳ brez franšize
- Zlonamerna in objestna dejanja
  ↳ brez franšize
- Toča (delni kasko) (samo če je delni kasko toča)
  ↳ brez franšize
- Kraja (delni kasko) (samo če je delni kasko kraja)
  ↳ brez franšize
- Parkirišče
  ↳ franšiza [X]% (~[EUR]€) ALI brez franšize
- Stekla
  ↳ franšiza [X]% (~[EUR]€) ALI brez franšize
- Svetlobna telesa in ogledala
  ↳ franšiza [X]% (~[EUR]€) ALI brez franšize
- Živali
  ↳ franšiza [X]% (~[EUR]€) ALI brez franšize

SKUPNA LETNA PREMIJA: [PREMIJA]€

Sem vam na voljo za vsa vprašanja.

Lep pozdrav,

Žan Mažgon
Zavarovalni zastopnik | Generali zavarovalnica d.d.

---

Za DOM polico (Paket Dom):
Pozdravljeni,

spodaj sem vam pripravil povzetek zavarovanja vašega stanovanja na naslovu [NASLOV], ki velja od [DATUM_OD] do [DATUM_DO].

PODATKI O STANOVANJU

- Stanovanje v [TIP], [IZVEDBA]
  ↳ leto izgradnje: [LETO]
- Število gospodinjstev: [ST]
- Material nosilne konstrukcije: [MATERIAL]
  ↳ strešna kritina: [KRITINA]
- Površine:
  ↳ bivalni prostor: [M2] m²
  ↳ odprta terasa/balkon/loža: [M2] m² (samo če > 0)
  ↳ kletni prostori: [M2] m² (samo če > 0)
  ↳ garaža: [M2] m² (samo če > 0)
  ↳ koristna površina skupaj: [M2] m²

PONUDBA

- Zavarovanje nepremičnine (samo če je sklop 1)
  ↳ način zavarovanja: [NACIN]
  ↳ zavarovalna vsota: [ZV]€
  ↳ kritja: osnovni paket – podrobnosti v priloženi brošuri
- Zavarovanje premičnin (samo če je sklop 2)
  ↳ način zavarovanja: [NACIN]
  ↳ zavarovalna vsota: [ZV]€
  ↳ kritja: osnovni paket – podrobnosti v priloženi brošuri
- Zavarovanje odgovornosti zasebnika in hišne odgovornosti (samo če je sklop 5)
  ↳ zavarovalna vsota: [ZV]€
  ↳ franšiza: brez

SKUPNA LETNA PREMIJA: [PREMIJA]€

Sem vam na voljo za vsa vprašanja.

Lep pozdrav,

Žan Mažgon
Zavarovalni zastopnik | Generali zavarovalnica d.d.

---

VRNI SAMO JSON v tem formatu, brez kakršnegakoli drugega besedila:
{"tip": "avto" ali "dom", "zadeva": "...", "mail": "..."}`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            {
              type: "document",
              source: { type: "base64", media_type: "application/pdf", data: base64 }
            },
            { type: "text", text: prompt }
          ]
        }]
      })
    });

    const data = await response.json();

    if (!response.ok) throw new Error(data.error?.message || 'API napaka');

    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    generatedZadeva = parsed.zadeva;
    generatedMail = parsed.mail;

    // Pokaži rezultat
    document.getElementById('loadingCard').classList.remove('show');
    document.getElementById('tipBadge').textContent = parsed.tip === 'avto' ? '🚗 Avtomobilsko' : '🏠 Dom';
    document.getElementById('zadeva').textContent = parsed.zadeva;
    document.getElementById('mailBody').textContent = parsed.mail;
    document.getElementById('resultCard').classList.add('show');

  } catch (err) {
    document.getElementById('loadingCard').classList.remove('show');
    document.getElementById('uploadCard').style.display = 'block';
    errorBox.textContent = '❌ Napaka: ' + err.message;
    errorBox.classList.add('show');
  }
}

function beriPdfBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Napaka pri branju datoteke'));
    r.readAsDataURL(file);
  });
}

function kopiraj() {
  const text = `Zadeva: ${generatedZadeva}\n\n${generatedMail}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Kopirano!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Kopiraj besedilo maila';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function novaPolica() {
  selectedFile = null;
  generatedMail = '';
  generatedZadeva = '';
  fileInput.value = '';
  fileSelected.classList.remove('show');
  generateBtn.disabled = true;
  errorBox.classList.remove('show');
  document.getElementById('uploadCard').style.display = 'block';
  document.getElementById('resultCard').classList.remove('show');
}
</script>
</body>
</html>
